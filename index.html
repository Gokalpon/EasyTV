<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="EasyTV">
<meta name="theme-color" content="#0a0a0a">
<meta name="mobile-web-app-capable" content="yes">
<title>EasyTV</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;800;900&family=Syne:wght@800&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;}
body{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;background:#0a0a0a;font-family:-apple-system,'SF Pro Text',system-ui,sans-serif;overflow:hidden;}

/* PHONE */
.phone{position:relative;width:393px;height:852px;border-radius:54px;overflow:hidden;flex-shrink:0;transform-origin:top left;box-shadow:0 0 0 1px rgba(255,255,255,.08),0 0 0 9px #0a0a0f,0 0 0 11px rgba(255,255,255,.05),0 40px 120px rgba(0,0,0,.92);}
.pill{position:absolute;top:13px;left:50%;transform:translateX(-50%);width:120px;height:34px;background:#000;border-radius:20px;z-index:400;pointer-events:none;}
.bg{position:absolute;inset:0;background:linear-gradient(170deg,#0d0e1c 0%,#080910 18%,#04040a 40%,#000000 55%,#020208 70%,#08091a 88%,#050510 100%);}
.bg::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 40% at 50% 35%,rgba(8,8,18,.0) 0%,rgba(0,0,0,.7) 100%);pointer-events:none;z-index:0;}
.bg::after{content:'';position:absolute;width:260px;height:260px;bottom:15%;right:5%;background:radial-gradient(circle,rgba(0,230,180,.15) 0%,transparent 60%);animation:ambFloat4 30s ease-in-out infinite alternate;filter:blur(30px);z-index:1;pointer-events:none;}
@keyframes ambFloat4{0%{transform:translate(0,0) scale(1);opacity:.3;filter:blur(55px)}40%{transform:translate(-70px,-50px) scale(1.3);opacity:.5;filter:blur(40px)}70%{transform:translate(40px,30px) scale(.85);opacity:.25;filter:blur(70px)}100%{transform:translate(0,0) scale(1);opacity:.3;filter:blur(55px)}}
.bg-ambient{position:absolute;inset:0;pointer-events:none;z-index:1;will-change:transform;}
.bg-ambient::before{content:'';position:absolute;width:400px;height:400px;top:-20px;left:-20px;background:radial-gradient(circle,rgba(120,50,255,.45) 0%,rgba(100,40,220,.15) 30%,transparent 55%);animation:ambFloat1 28s ease-in-out infinite alternate;filter:blur(32px);}
.bg-ambient::after{content:'';position:absolute;width:350px;height:350px;bottom:20px;right:-10px;background:radial-gradient(circle,rgba(255,40,150,.35) 0%,rgba(220,30,140,.12) 30%,transparent 55%);animation:ambFloat2 32s ease-in-out infinite alternate;filter:blur(32px);}
@keyframes ambFloat1{0%{transform:translate(-50px,-30px) scale(1);opacity:.65;filter:blur(60px)}25%{transform:translate(30px,-80px) scale(1.3);opacity:.8;filter:blur(45px)}50%{transform:translate(-80px,20px) scale(.85);opacity:.5;filter:blur(70px)}75%{transform:translate(40px,-40px) scale(1.15);opacity:.75;filter:blur(50px)}100%{transform:translate(-50px,-30px) scale(1);opacity:.65;filter:blur(60px)}}
@keyframes ambFloat2{0%{transform:translate(30px,20px) scale(1);opacity:.55;filter:blur(55px)}30%{transform:translate(-40px,60px) scale(1.2);opacity:.4;filter:blur(65px)}60%{transform:translate(70px,-20px) scale(.9);opacity:.7;filter:blur(45px)}85%{transform:translate(-20px,40px) scale(1.1);opacity:.45;filter:blur(60px)}100%{transform:translate(30px,20px) scale(1);opacity:.55;filter:blur(55px)}}
.bg-grain{position:absolute;inset:0;pointer-events:none;z-index:1;}
.bg-grain::before{content:'';position:absolute;width:300px;height:300px;top:30%;left:15%;background:radial-gradient(circle,rgba(30,170,255,.28) 0%,rgba(20,120,200,.08) 35%,transparent 55%);animation:ambFloat3 25s ease-in-out infinite alternate;filter:blur(28px);}
.bg-grain::after{content:'';position:absolute;inset:0;opacity:.055;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px 200px;mix-blend-mode:overlay;}
@keyframes ambFloat3{0%{transform:translate(-30px,0) scale(1);opacity:.4;filter:blur(50px)}35%{transform:translate(50px,-50px) scale(1.25);opacity:.6;filter:blur(40px)}65%{transform:translate(-60px,30px) scale(.8);opacity:.35;filter:blur(65px)}100%{transform:translate(-30px,0) scale(1);opacity:.4;filter:blur(50px)}}

/* RENK KÖRÜ MODU */
body.colorblind .phone>*:not(.bg){filter:url(#cb-filter);}
svg#cb-svg{position:absolute;width:0;height:0;}

/* STATUS BAR */
.statusbar{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:18px 26px 0;height:54px;flex-shrink:0;}
.sb-time{font-size:15px;font-weight:600;color:#fff;letter-spacing:-.3px}
.sb-right{display:flex;gap:6px;align-items:center}

/* LOGO */
.easytv-logo{display:inline-flex;align-items:baseline;user-select:none;line-height:1;}
.logo-easy{font-family:'Playfair Display',Georgia,serif;font-style:italic;font-weight:400;color:rgba(255,255,255,.82);letter-spacing:.5px;}
.logo-tv{font-family:'Syne','Inter',-apple-system,sans-serif;font-weight:800;color:#fff;letter-spacing:-2px;margin-left:1px;}
.lv-home .logo-easy{font-size:25px}.lv-home .logo-tv{font-size:27px}
.lv-pin .logo-easy{font-size:20px}.lv-pin .logo-tv{font-size:22px}
.lv-wlc .logo-easy{font-size:28px}.lv-wlc .logo-tv{font-size:32px;letter-spacing:-2px}

/* APP */
.app{position:absolute;inset:0;display:flex;flex-direction:column;z-index:10;overflow:hidden;}
.tab-panel{display:none;flex:1;flex-direction:column;overflow:hidden;}
.tab-panel.active{display:flex;}

/* HOME */
.home-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 8px;flex-shrink:0;}
.add-btn{width:40px;height:40px;border-radius:14px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .22s cubic-bezier(.34,1.4,.64,1);position:relative;overflow:hidden;}
.add-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(130,80,255,.15),rgba(255,60,170,.1));opacity:0;transition:opacity .25s;border-radius:12px;}
.add-btn:hover::after,.add-btn:active::after{opacity:1;}
.home-greeting{font-size:14px;font-weight:700;color:rgba(255,255,255,.45);letter-spacing:-.2px;flex-shrink:0;}
.add-btn-abs{position:absolute;right:20px;top:50%;transform:translateY(-50%);}
.add-btn:active{transform:scale(.88);}
.home-quick-stat{display:none;}
.quick-stat-pill{display:flex;align-items:center;gap:5px;padding:6px 14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:20px;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);transition:background .2s,transform .2s;}
.quick-stat-pill:active{transform:scale(.95);}
.quick-stat-pill:hover{background:rgba(255,255,255,.07);}
.quick-stat-val{font-size:13px;font-weight:700;color:rgba(255,255,255,.75);letter-spacing:-.2px;}
.quick-stat-lbl{font-size:10px;font-weight:600;color:rgba(255,255,255,.3);letter-spacing:.2px;text-transform:uppercase;}
.grid-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:10px 56px 100px;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.grid-scroll::-webkit-scrollbar{display:none}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* TILE */
@keyframes tileIn{from{opacity:0;transform:scale(.85) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes dragSettle{from{transform:scale(1.06) translateZ(0)}to{transform:scale(1) translateZ(0)}}
@keyframes emptyBob{0%,100%{transform:translateY(0) rotate(0deg)}25%{transform:translateY(-8px) rotate(-2deg)}75%{transform:translateY(-3px) rotate(1deg)}}
@keyframes jiggle{0%{transform:rotate(0deg)}25%{transform:rotate(-1.2deg)}50%{transform:rotate(0deg)}75%{transform:rotate(1.2deg)}100%{transform:rotate(0deg)}}
.tile{aspect-ratio:1;border-radius:20px;animation:tileIn .4s cubic-bezier(.34,1.15,.64,1) both;position:relative;overflow:hidden;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;background:transparent;border:1px solid rgba(255,255,255,.06);backdrop-filter:none;-webkit-backdrop-filter:none;box-shadow:0 4px 24px rgba(0,0,0,.2),inset 0 1px 0 rgba(255,255,255,.04);transform:scale(1) translateZ(0);transition:transform .3s cubic-bezier(.34,1.4,.64,1),box-shadow .3s,opacity .2s;will-change:transform;user-select:none;background-size:cover;background-position:center;background-repeat:no-repeat;touch-action:none;}
.tile .ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.15);transform:scale(0);animation:tileRipple .5s ease-out forwards;z-index:2;pointer-events:none;}
@keyframes tileRipple{to{transform:scale(4);opacity:0;}}
.tile::before{content:'';position:absolute;inset:0;border-radius:20px;background:linear-gradient(180deg,rgba(255,255,255,.03) 0%,transparent 50%);pointer-events:none;z-index:1;transition:opacity .22s;}
.tile-logo{position:absolute;top:0;left:0;right:0;bottom:0;z-index:3;display:flex;align-items:center;justify-content:center;padding-bottom:24px;filter:drop-shadow(0 2px 10px rgba(0,0,0,.45));opacity:.95;transition:transform .3s cubic-bezier(.34,1.4,.64,1),opacity .2s;pointer-events:none;overflow:hidden;}
.tile-logo img{width:66px!important;height:66px!important;object-fit:contain!important;aspect-ratio:1/1;}
.tile-logo svg{width:52px!important;height:52px!important;}
.tile-label{position:absolute;bottom:14px;left:0;right:0;z-index:3;font-size:11px;font-weight:600;color:rgba(255,255,255,.7);letter-spacing:-.1px;text-shadow:0 1px 6px rgba(0,0,0,.7);transition:color .2s,text-shadow .2s;text-align:center;}
.tile.active{backdrop-filter:none!important;-webkit-backdrop-filter:none!important;transform:scale(1.05) translateZ(0);border-color:rgba(255,255,255,.12);}
.tile.active::before{opacity:0;}
.tile.active .tile-logo{opacity:1;transform:scale(1.08);}
.tile.active .tile-label{color:#fff;text-shadow:0 1px 8px rgba(0,0,0,.5);}
.tile.dark-text .tile-label{color:rgba(0,0,0,.8)!important;text-shadow:none!important;}
.tile.jiggle{animation:jiggle .25s ease-in-out infinite;}
.tile.dragging{opacity:.88;z-index:100;box-shadow:0 20px 50px rgba(0,0,0,.55),0 0 0 2px rgba(255,255,255,.15),0 0 30px rgba(120,80,220,.1);transition:none!important;}
.tile.drag-over{transform:scale(.9) translateZ(0)!important;opacity:.5;transition:transform .2s cubic-bezier(.34,1.4,.64,1),opacity .2s;}
.tile.drag-settle{animation:dragSettle .35s cubic-bezier(.34,1.4,.64,1) both;}
.tile:not(.dragging):not(.jiggle):active{transform:scale(.92) translateZ(0)!important;}

/* NAV */
.bottom-nav{position:absolute;bottom:34px;left:14px;right:14px;z-index:50;display:flex;align-items:center;border-radius:24px;background:rgba(255,255,255,.08);backdrop-filter:blur(40px) saturate(180%);-webkit-backdrop-filter:blur(40px) saturate(180%);border:1px solid rgba(255,255,255,.12);border-top:1px solid rgba(255,255,255,.2);height:62px;box-shadow:inset 0 1px 0 rgba(255,255,255,.12);}
.nav-fade{position:absolute;bottom:0;left:0;right:0;height:170px;background:linear-gradient(to top,rgba(0,0,0,.96) 0%,rgba(0,0,0,.7) 45%,transparent 100%);pointer-events:none;z-index:49;}
.nav-glow{position:absolute;width:100px;height:60px;border-radius:50%;background:radial-gradient(circle,rgba(120,60,255,.35) 0%,transparent 70%);filter:blur(18px);transition:left .5s cubic-bezier(.34,1.4,.64,1),opacity .4s,background 1s ease;top:50%;transform:translateY(-50%);z-index:0;pointer-events:none;opacity:0;}
.nav-glow.on{opacity:1;animation:navGlowFlash .6s cubic-bezier(.4,0,.2,1) forwards;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;padding:8px 0;transition:opacity .3s cubic-bezier(.4,0,.2,1),transform .25s cubic-bezier(.34,1.4,.64,1);opacity:.3;transform:scale(1);position:relative;z-index:1;}
.nav-item.active{opacity:1;}
.nav-item:active{transform:scale(.82);}
.nav-label{font-size:9px;font-weight:700;color:rgba(255,255,255,.35);letter-spacing:.3px;transition:color .3s;}
.nav-item.active .nav-label{color:rgba(255,255,255,.85);}
.nav-item.active svg{filter:drop-shadow(0 0 10px rgba(130,80,255,.4));}
.nav-dot{width:4px;height:4px;border-radius:50%;background:linear-gradient(135deg,#a78bfa,#818cf8);opacity:0;margin-top:1px;transition:opacity .3s,transform .35s cubic-bezier(.34,1.56,.64,1);transform:scale(0);box-shadow:0 0 6px rgba(130,80,255,.4);}
.nav-item.active .nav-dot{opacity:1;transform:scale(1);}

/* TAB HEADER */
.tab-header{padding:14px 22px 10px;flex-shrink:0;}
.tab-title{font-size:26px;font-weight:700;color:#fff;letter-spacing:-.6px;}
.tab-sub{font-size:13px;color:rgba(255,255,255,.38);margin-top:3px;}

/* SUBS */
.subs-scroll{flex:1;overflow-y:auto;padding:4px 16px 100px;scrollbar-width:none;}
.subs-scroll::-webkit-scrollbar{display:none;}
.subs-summary{background:linear-gradient(145deg,rgba(12,12,20,.68),rgba(8,8,16,.58));border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:18px 20px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;backdrop-filter:blur(24px) saturate(140%);-webkit-backdrop-filter:blur(24px) saturate(140%);position:relative;overflow:hidden;}
.subs-summary::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 0%,rgba(130,80,255,.06),transparent 60%);pointer-events:none;}
.subs-summary::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 5%,rgba(130,80,255,.35) 25%,rgba(255,60,170,.25) 50%,rgba(50,170,255,.25) 75%,transparent 95%);}
.subs-total-lbl{font-size:12px;font-weight:600;color:rgba(255,255,255,.4);letter-spacing:.4px;text-transform:uppercase;}
.subs-total-val{font-size:28px;font-weight:800;color:#fff;letter-spacing:-1px;margin-top:4px;}
.subs-next-lbl{font-size:11px;color:rgba(255,255,255,.35);font-weight:500;text-align:right;}
.subs-next-val{font-size:15px;font-weight:700;color:#fff;text-align:right;margin-top:2px;}
.sub-card{position:relative;border-radius:18px;padding:16px;padding-left:20px;margin-bottom:8px;display:flex;align-items:center;gap:14px;background:linear-gradient(145deg,rgba(12,12,20,.68),rgba(8,8,16,.58));border:1px solid rgba(255,255,255,.07);overflow:hidden;transition:opacity .2s,transform .25s cubic-bezier(.34,1.4,.64,1);backdrop-filter:blur(24px) saturate(140%);-webkit-backdrop-filter:blur(24px) saturate(140%);}
.sub-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3.5px;background:var(--svc-color,rgba(255,255,255,.2));border-radius:18px 0 0 18px;}
.sub-card:active{transform:scale(.97);}
.sub-card::after{content:'';position:absolute;top:0;right:0;width:60%;height:100%;background:radial-gradient(ellipse at top right,rgba(130,80,255,.04),transparent 60%);pointer-events:none;}
.sub-info{flex:1;min-width:0;}
.sub-name{font-size:15px;font-weight:650;color:#fff;letter-spacing:-.2px;}
.sub-plan{font-size:12px;color:rgba(255,255,255,.35);margin-top:2px;font-weight:500;}
.sub-right{text-align:right;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
.sub-price{font-size:18px;font-weight:800;color:#fff;letter-spacing:-.5px;line-height:1;}
.sub-permonth{font-size:11px;color:rgba(255,255,255,.3);font-weight:500;margin-top:-2px;}
.sub-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:rgba(255,59,48,.2);color:#ff6b6b;border:1px solid rgba(255,59,48,.15);margin-top:4px;letter-spacing:.1px;}
.sub-badge.ok{background:rgba(52,199,89,.12);color:#4cd964;border-color:rgba(52,199,89,.15);}
.sub-badge.warn{background:rgba(255,149,0,.15);color:#ff9500;border-color:rgba(255,149,0,.15);}
.sub-edit-btn{font-size:12px;font-weight:600;color:rgba(255,255,255,.45);background:none;border:none;cursor:pointer;padding:0;letter-spacing:.1px;}

/* PROFILE */
.profile-scroll{flex:1;overflow-y:auto;padding:4px 16px 12px;scrollbar-width:none;padding-bottom:100px;}
.profile-scroll::-webkit-scrollbar{display:none;}
.profile-avatar{width:76px;height:76px;border-radius:24px;background:linear-gradient(135deg,#4a3a6e,#2a2540);border:1.5px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:800;color:rgba(255,255,255,.9);margin:8px 0 16px;cursor:pointer;transition:opacity .16s;position:relative;}
.profile-avatar::before{content:'';position:absolute;inset:-3px;border-radius:24px;background:linear-gradient(135deg,rgba(130,70,255,.5),rgba(255,60,170,.4),rgba(50,170,255,.4));z-index:-1;animation:avatarGlow 4s ease-in-out infinite alternate;}
@keyframes avatarGlow{0%{opacity:.5;filter:blur(2px)}100%{opacity:.9;filter:blur(4px)}}
.profile-avatar:active{opacity:.7;}
.profile-name{font-size:22px;font-weight:800;color:#fff;letter-spacing:-.5px;cursor:pointer;}
.profile-email{font-size:13px;color:rgba(255,255,255,.38);margin-top:3px;cursor:pointer;}
.profile-edit-hint{font-size:11px;color:rgba(255,255,255,.2);margin-top:6px;}
.profile-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:18px 0;}
.stat-card{background:linear-gradient(145deg,rgba(12,12,20,.68),rgba(8,8,16,.58));border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 10px;text-align:center;position:relative;overflow:hidden;backdrop-filter:blur(24px) saturate(140%);-webkit-backdrop-filter:blur(24px) saturate(140%);transition:transform .2s cubic-bezier(.34,1.4,.64,1);}
.stat-card:active{transform:scale(.96);}
.stat-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(130,80,255,.08),transparent 70%);pointer-events:none;}
.stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 10%,rgba(130,80,255,.4) 35%,rgba(255,60,170,.3) 65%,transparent 90%);}
.stat-val{font-size:22px;font-weight:800;color:#fff;letter-spacing:-.5px;}
.stat-lbl{font-size:10px;color:rgba(255,255,255,.38);font-weight:600;margin-top:4px;letter-spacing:.3px;text-transform:uppercase;}
.menu-group{background:linear-gradient(160deg,rgba(12,12,20,.68),rgba(8,8,16,.58));border:1px solid rgba(255,255,255,.08);border-radius:20px;overflow:hidden;margin-bottom:12px;position:relative;backdrop-filter:blur(24px) saturate(140%);-webkit-backdrop-filter:blur(24px) saturate(140%);}
.menu-group::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 5%,rgba(130,80,255,.3) 30%,rgba(255,60,170,.2) 70%,transparent 95%);}
.menu-item{display:flex;align-items:center;gap:14px;padding:15px 16px;cursor:pointer;transition:background .18s,transform .15s;}
.menu-item:active{background:rgba(130,80,255,.08);transform:scale(.98);}
.menu-ico{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;overflow:hidden;}
.menu-ico::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(130,80,255,.12),rgba(255,60,170,.08));border-radius:10px;pointer-events:none;}
.menu-item+.menu-item{border-top:1px solid rgba(255,255,255,.05);}
.menu-text{flex:1;}
.menu-lbl{font-size:15px;font-weight:600;color:#fff;}
.menu-desc{font-size:12px;color:rgba(255,255,255,.35);margin-top:1px;}
.menu-arrow{color:rgba(255,255,255,.2);font-size:15px;transition:transform .2s;}
.menu-item:active .menu-arrow{transform:translateX(2px);}

/* SETTINGS */
.settings-scroll{flex:1;overflow-y:auto;padding:4px 16px 12px;scrollbar-width:none;padding-bottom:80px;}
.settings-scroll::-webkit-scrollbar{display:none;}
.settings-section-lbl{font-size:11px;font-weight:700;color:rgba(255,255,255,.32);letter-spacing:.6px;text-transform:uppercase;padding:14px 4px 8px;}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;}
.toggle-row+.toggle-row{border-top:1px solid rgba(255,255,255,.06);}
.toggle-lbl{font-size:15px;font-weight:600;color:#fff;}
.toggle-desc{font-size:12px;color:rgba(255,255,255,.35);margin-top:1px;}
.toggle{width:48px;height:28px;border-radius:14px;background:rgba(255,255,255,.15);position:relative;cursor:pointer;transition:background .24s;flex-shrink:0;}
.toggle.on{background:#34c759;}
.toggle-knob{position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.3);transition:left .24s cubic-bezier(.34,1.4,.64,1);}
.toggle.on .toggle-knob{left:23px;}

/* DIMMER */
.dimmer{position:absolute;inset:0;z-index:60;background:transparent;pointer-events:none;transition:background .28s,backdrop-filter .28s,-webkit-backdrop-filter .28s;border-radius:54px;}
.dimmer.on{background:rgba(0,0,0,.55);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);pointer-events:all;}

/* SHEET */
.sheet{position:absolute;bottom:0;left:0;right:0;z-index:70;border-radius:28px 28px 0 0;overflow:hidden;transform:translateY(102%);transition:transform .44s cubic-bezier(.32,.72,0,1);}
.sheet.open{transform:translateY(0);}
.sheet-bg{position:absolute;inset:0;background:rgba(10,11,16,.96);backdrop-filter:blur(40px) saturate(180%);-webkit-backdrop-filter:blur(40px) saturate(180%);}
.sheet-color{position:absolute;inset:0;opacity:.1;transition:background .28s;}
.sheet-body{position:relative;z-index:1;padding-bottom:36px;}
.s-head{transition:transform .3s ease;}
.s-handle{width:36px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin:12px auto 0;}
.s-head{display:flex;align-items:center;padding:18px 20px 16px;gap:15px;}
.s-logo-wrap{width:50px;height:50px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;}
.s-logo-inner{position:relative;z-index:1;display:flex;align-items:center;justify-content:center;width:100%;height:100%;}
.s-info{flex:1;min-width:0;}
.s-name{font-size:20px;font-weight:700;color:#fff;letter-spacing:-.4px;}
.s-sub{font-size:12px;color:rgba(255,255,255,.38);margin-top:2px;}
.s-close{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.1);cursor:pointer;color:rgba(255,255,255,.55);font-size:11px;display:flex;align-items:center;justify-content:center;transition:background .16s;flex-shrink:0;}
.s-close:active{background:rgba(255,255,255,.22);}
.s-divider{height:1px;background:rgba(255,255,255,.08);margin:0 20px;}
.cred-section{margin:14px 14px 0;border-radius:18px;overflow:hidden;background:linear-gradient(145deg,rgba(255,255,255,.07),rgba(255,255,255,.025));border:1px solid rgba(255,255,255,.08);}
.cred-row{display:flex;align-items:center;gap:13px;padding:14px 16px;transition:background .12s;}
.cred-row:active{background:rgba(255,255,255,.04);}
.cred-row+.cred-row{border-top:1px solid rgba(255,255,255,.06);}
.cred-ico-wrap{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.08);}
.cred-info{flex:1;min-width:0;overflow:hidden;}
.cred-lbl{font-size:10px;font-weight:600;color:rgba(255,255,255,.36);letter-spacing:.6px;text-transform:uppercase;margin-bottom:3px;}
.cred-val{font-size:15px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cred-acts{display:flex;gap:6px;flex-shrink:0;}
.cred-btn{width:32px;height:32px;border-radius:10px;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.09);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .16s,transform .1s;}
.cred-btn:active{transform:scale(.84);background:rgba(255,255,255,.18);}
.cred-btn.ok{background:rgba(52,199,89,.22);border-color:rgba(52,199,89,.35);}

/* SHEET ACTION BUTTONS */
.sheet-actions{margin:10px 14px 0;display:flex;flex-direction:column;gap:8px;}
.qr-btn{width:100%;padding:15px 20px;border-radius:16px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;color:#fff;border:none;transition:opacity .18s,transform .2s cubic-bezier(.34,1.3,.64,1);}
.qr-btn:active{transform:scale(.97);opacity:.85;}
.app-open-btn{width:100%;padding:14px 20px;border-radius:16px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:#fff;transition:background .18s,transform .16s;}
.app-open-btn:active{transform:scale(.97);background:rgba(255,255,255,.18);}
.share-btn{width:100%;padding:13px 20px;border-radius:16px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.6);transition:background .18s,transform .16s;}
.share-btn:active{transform:scale(.97);}

/* QR OVERLAY */
.qr-ov{position:absolute;inset:0;z-index:90;background:#000;border-radius:54px;overflow:hidden;display:flex;flex-direction:column;align-items:center;transform:translateY(100%);transition:transform .4s cubic-bezier(.32,.72,0,1);}
.qr-ov.open{transform:translateY(0);}
.qr-cam{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 48%,#0c1520 0%,#000 70%);}
.qr-top{position:relative;z-index:5;width:100%;display:flex;justify-content:space-between;align-items:center;padding:60px 22px 0;}
.qr-close-btn{background:rgba(255,255,255,.12);border:none;border-radius:20px;color:#fff;padding:8px 18px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;}
.qr-timer-badge{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:20px;color:rgba(255,255,255,.65);padding:6px 14px;font-size:13px;font-weight:600;font-family:inherit;}
.qr-fw{position:relative;z-index:5;flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:24px;}
.finder{width:220px;height:220px;position:relative;display:flex;align-items:center;justify-content:center;}
.fc{position:absolute;width:24px;height:24px;border-color:#fff;border-style:solid;}
.fc.tl{top:0;left:0;border-width:3px 0 0 3px;border-radius:4px 0 0 0;}
.fc.tr{top:0;right:0;border-width:3px 3px 0 0;border-radius:0 4px 0 0;}
.fc.bl{bottom:0;left:0;border-width:0 0 3px 3px;border-radius:0 0 0 4px;}
.fc.br{bottom:0;right:0;border-width:0 3px 3px 0;border-radius:0 0 4px 0;}
.qr-code-area{width:188px;height:188px;display:flex;align-items:center;justify-content:center;}
@keyframes scanline{from{top:10px;opacity:.9}to{top:190px;opacity:.3}}
.scanline{position:absolute;left:10px;right:10px;height:2px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.7),transparent);animation:scanline 2.4s ease-in-out infinite;border-radius:1px;}
.qr-service-name{font-size:16px;font-weight:700;color:#fff;letter-spacing:-.2px;}
.qr-hint{font-size:13px;color:rgba(255,255,255,.45);margin-top:-12px;text-align:center;}

/* ADD SERVICE */
.add-modal{position:absolute;inset:0;z-index:80;display:flex;flex-direction:column;justify-content:flex-end;pointer-events:none;}
.add-modal.open{pointer-events:all;}
.add-modal-bg{position:absolute;inset:0;background:rgba(0,0,0,0);transition:background .3s;}
.add-modal.open .add-modal-bg{background:rgba(0,0,0,.6);}
